<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src *; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <title>DITL</title>
  <link rel="stylesheet" href="styles/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { background: #0c0c14; color: #e2e8f0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
    .titlebar { -webkit-app-region: drag; height: 42px; display: flex; align-items: center; background: linear-gradient(90deg, #0f0f1a 0%, #141425 100%); padding: 0 16px; user-select: none; border-bottom: 1px solid rgba(124,58,237,0.15); }
    .titlebar button { -webkit-app-region: no-drag; background: none; border: none; color: #6b6b80; font-size: 14px; width: 32px; height: 26px; cursor: pointer; border-radius: 6px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
    .titlebar button:hover { background: rgba(255,255,255,0.08); color: #c0c0d0; }
    .titlebar .close:hover { background: rgba(239,68,68,0.8); color: white; }
    .titlebar .logo { display: flex; align-items: center; gap: 8px; flex: 1; }
    .titlebar .logo-img { width: 18px; height: 18px; object-fit: contain; border-radius: 4px; }
    .titlebar .logo-text { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .titlebar .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; box-shadow: 0 0 8px rgba(124,58,237,0.6); }
    #app { height: calc(100vh - 42px); display: flex; flex-direction: column; overflow: hidden; }
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    ::selection { background: rgba(124,58,237,0.4); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(124,58,237,0.5); }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="logo">
      <img class="logo-img" src="../../Ditl_logo.png" alt="logo">
      <span class="logo-text">DITL</span>
    </div>
    <button onclick="api.minimize()">─</button>
    <button onclick="api.maximize()">☐</button>
    <button class="close" onclick="api.close()">✕</button>
  </div>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
